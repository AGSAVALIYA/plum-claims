# Prometheus configuration for Plum Claims
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: plum-claims

scrape_configs:
  - job_name: "plum-claims-app"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          env: production

  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9090"]
