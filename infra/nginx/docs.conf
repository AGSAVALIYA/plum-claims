server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html/docs;
    index index.mdx index.md index.html;

    # Serve .md and .mdx files as plain text so they're readable in-browser
    types {
        text/markdown md;
        text/markdown mdx;
    }

    location / {
        try_files $uri $uri/ =404;
        autoindex on;
    }

    # Enable gzip for markdown/text
    gzip on;
    gzip_types text/plain text/markdown text/css application/json application/javascript text/xml;
}
